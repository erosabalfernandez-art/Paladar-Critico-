<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gold circle background -->
  <circle cx="50" cy="50" r="50" fill="#B8860B"/>

  <!-- Graduation cap: top board (diamond) -->
