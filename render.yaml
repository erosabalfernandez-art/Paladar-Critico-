services:
  # ── BACKEND (API) ─────────────────────────────────────────────
  - type: web
    name: paladar-critico-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm run typecheck:libs && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false          # lo pegas tú en Render
      - key: ADMIN_PASSWORD
        sync: false          # lo escribes tú en Render
      - key: SESSION_SECRET
        sync: false          # lo escribes tú en Render (cualquier texto largo)

  # ── FRONTEND (Sitio web) ───────────────────────────────────────
  - type: web
    name: paladar-critico-web
    env: static
    region: frankfurt
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm run typecheck:libs && pnpm --filter @workspace/cocina-opina run build
    staticPublishPath: ./artifacts/cocina-opina/dist
    envVars:
      - key: VITE_API_URL
        sync: false          # pega aquí la URL del backend (paladar-critico-api)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
